<!DOCTYPE html>
<html>
<head>
<style>
  body {
    margin: 0;
    padding: 40px;
    background: #0a0a0a;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
  }
  .card {
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
    border-radius: 16px;
    padding: 60px 80px;
    width: 900px;
    border: 1px solid #d4a01733;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  }
  .title {
    color: #d4a017;
    font-size: 18px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 20px;
  }
  h1 {
    color: #ffffff;
    font-size: 36px;
    font-weight: 700;
    line-height: 1.3;
    margin: 0 0 40px 0;
  }
  h1 span {
    color: #d4a017;
  }
  .flow {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 30px;
  }
  .tier {
    background: #ffffff0d;
    border: 1px solid #ffffff1a;
    border-radius: 12px;
    padding: 20px 24px;
    text-align: center;
    flex: 1;
  }
  .tier.active {
    background: #d4a01715;
    border-color: #d4a01744;
  }
  .tier-label {
    color: #888;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 8px;
  }
  .tier-name {
    color: #fff;
    font-size: 16px;
    font-weight: 600;
    margin-bottom: 4px;
  }
  .tier-detail {
    color: #aaa;
    font-size: 13px;
  }
  .tier.active .tier-name {
    color: #d4a017;
  }
  .arrow {
    color: #555;
    font-size: 24px;
  }
  .stats {
    display: flex;
    gap: 40px;
    margin-top: 10px;
  }
  .stat {
    text-align: center;
  }
  .stat-value {
    color: #d4a017;
    font-size: 32px;
    font-weight: 700;
  }
  .stat-label {
    color: #888;
    font-size: 13px;
    margin-top: 4px;
  }
</style>
</head>
<body>
  <div class="card">
    <div class="title">GoldenMatch v0.3.0</div>
    <h1>LLM-as-Judge for<br>Entity Resolution:<br><span>95% Precision for $0.04</span></h1>
    <div class="flow">
      <div class="tier">
        <div class="tier-label">Tier 1</div>
        <div class="tier-name">Auto-Accept</div>
        <div class="tier-detail">score >= 0.95</div>
      </div>
      <div class="arrow">&rarr;</div>
      <div class="tier active">
        <div class="tier-label">Tier 2</div>
        <div class="tier-name">LLM Judge</div>
        <div class="tier-detail">GPT-4o-mini</div>
      </div>
      <div class="arrow">&rarr;</div>
      <div class="tier">
        <div class="tier-label">Tier 3</div>
        <div class="tier-name">Auto-Reject</div>
        <div class="tier-detail">score < 0.75</div>
      </div>
    </div>
    <div class="stats">
      <div class="stat">
        <div class="stat-value">66.3%</div>
        <div class="stat-label">F1 Score</div>
      </div>
      <div class="stat">
        <div class="stat-value">95.4%</div>
        <div class="stat-label">Precision</div>
      </div>
      <div class="stat">
        <div class="stat-value">$0.04</div>
        <div class="stat-label">Total Cost</div>
      </div>
      <div class="stat">
        <div class="stat-value">88</div>
        <div class="stat-label">API Calls</div>
      </div>
    </div>
  </div>
</body>
</html>
