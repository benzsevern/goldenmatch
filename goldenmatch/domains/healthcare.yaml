name: healthcare
signals: ["ndc", "patient", "diagnosis", "icd", "cpt", "npi", "fda", "implant", "sterile", "dosage", "mg", "ml", "prescription"]
identifier_patterns:
  ndc: '\b(\d{5}-\d{4}-\d{2})\b'
  npi: '(?:NPI\s*:?\s*)\b(\d{10})\b'
  icd10: '\b([A-Z]\d{2}(?:\.\d{1,4})?)\b'
  cpt: '(?:CPT\s*:?\s*)\b(\d{5})\b'
brand_patterns:
  - Medtronic
  - Abbott
  - Johnson & Johnson
  - Baxter
  - Boston Scientific
  - Stryker
  - Becton Dickinson
  - Zimmer Biomet
  - Edwards Lifesciences
  - Cardinal Health
  - McKesson
  - AmerisourceBergen
  - Pfizer
  - Merck
  - Roche
  - Novartis
  - AstraZeneca
  - Bristol-Myers Squibb
  - Eli Lilly
  - Amgen
attribute_patterns:
  dosage_mg: '(\d+(?:\.\d+)?)\s*mg\b'
  dosage_ml: '(\d+(?:\.\d+)?)\s*ml\b'
  gauge: '(\d+)\s*(?:ga|gauge)\b'
  length_mm: '(\d+(?:\.\d+)?)\s*mm\b'
  count: '(\d+)\s*(?:count|ct|pack|pk)\b'
stop_words:
  - the
  - a
  - an
  - for
  - and
  - with
  - sterile
  - disposable
  - single
  - use
  - each
  - per
  - box
  - case
  - unit
  - dose
  - tablet
  - capsule
  - injection
  - solution
  - suspension
normalization:
  lowercase: true
  strip_punctuation: true
autoconfig_preset:
  blocking:
    strategy: multi_pass
    max_block_size: 500
    skip_oversized: true
  scorer_overrides:
    name: {scorer: ensemble, weight: 2.0}
    npi: {scorer: exact, weight: 1.5}
    specialty: {scorer: token_sort, weight: 0.8}
  threshold: 0.90
  recommended_standardization:
    name: [strip, name_proper]
