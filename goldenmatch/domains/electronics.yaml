name: electronics
signals: ["brand", "model", "sku", "upc", "ean", "asin", "megapixel", "mp", "ghz", "watt", "battery", "wireless", "bluetooth"]
identifier_patterns:
  model_number: '\b([A-Z]{1,5}[-]?\d{2,}[A-Z0-9]*(?:[-/]\w+)?)\b'
  sku: '\b(\d{6,}|[A-Z]{2,}\d{4,})\b'
brand_patterns:
  - Sony
  - Samsung
  - LG
  - Apple
  - HP
  - Dell
  - Canon
  - Nikon
  - Panasonic
  - Philips
  - Bose
  - JBL
  - Logitech
  - Microsoft
  - Intel
  - AMD
  - Asus
  - Acer
  - Lenovo
  - Toshiba
  - Epson
  - Brother
  - Xerox
  - Bosch
  - Makita
  - DeWalt
  - Nike
  - Adidas
  - Netgear
  - D-Link
  - Linksys
  - Pioneer
  - Denon
  - KitchenAid
  - Tripp-Lite
  - Nikon
attribute_patterns:
  megapixels: '(\d+\.?\d*)\s*(?:mega\s*pixel|mp)\b'
  storage_gb: '(\d+)\s*(?:gb|gigabyte)\b'
  screen_inch: '(\d+\.?\d*)\s*(?:inch|in\.|")\b'
  ram_gb: '(\d+)\s*gb\s*(?:ram|ddr|memory)\b'
  watts: '(\d+)\s*(?:watt|w)\b'
  speed_ghz: '(\d+\.?\d*)\s*ghz\b'
stop_words: ["the", "a", "an", "for", "and", "with", "by", "from", "to", "in", "of", "black", "white", "silver", "gold", "finish"]
normalization:
  strip_hyphens: true
  uppercase: true
  strip_region_suffix: true
  strip_color_suffix: true
autoconfig_preset:
  blocking:
    strategy: ann
    ann_top_k: 20
    max_block_size: 1000
    skip_oversized: true
  scorer_overrides:
    description: {scorer: ensemble, weight: 2.0}
    brand: {scorer: jaro_winkler, weight: 1.5}
    category: {scorer: token_sort, weight: 1.0}
  threshold: 0.85
  recommended_standardization:
    description: [strip, trim_whitespace]
    brand: [strip]
