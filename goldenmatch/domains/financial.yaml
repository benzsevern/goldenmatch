name: financial
signals: ["cusip", "isin", "lei", "ticker", "sedol", "figi", "fund", "bond", "equity", "portfolio", "aum", "nav"]
identifier_patterns:
  cusip: '(?:CUSIP\s*:?\s*)\b([A-Z0-9]{9})\b'
  isin: '(?:ISIN\s*:?\s*)\b([A-Z]{2}[A-Z0-9]{10})\b'
  lei: '(?:LEI\s*:?\s*)\b([A-Z0-9]{20})\b'
  sedol: '(?:SEDOL\s*:?\s*)\b([A-Z0-9]{7})\b'
  ticker: '(?:ticker|symbol|stock)\s*:?\s*\b([A-Z]{1,5})\b'
  figi: '\b(BBG[A-Z0-9]{9})\b'
brand_patterns:
  - Goldman Sachs
  - JPMorgan
  - Morgan Stanley
  - BlackRock
  - Vanguard
  - Fidelity
  - Charles Schwab
  - State Street
  - BNY Mellon
  - Citigroup
  - Bank of America
  - Wells Fargo
  - Deutsche Bank
  - UBS
  - Credit Suisse
  - Barclays
  - HSBC
  - BNP Paribas
  - Nomura
  - Bridgewater
attribute_patterns:
  currency: '\b(USD|EUR|GBP|JPY|CHF|CAD|AUD)\b'
  maturity_year: '\b(20[2-9]\d)\b'
  coupon_rate: '(\d+(?:\.\d+)?)\s*%'
  shares: '(\d{1,3}(?:,\d{3})*)\s*(?:shares|sh)\b'
stop_words:
  - the
  - a
  - an
  - inc
  - llc
  - corp
  - ltd
  - plc
  - sa
  - ag
  - co
  - group
  - holdings
  - capital
  - management
  - fund
  - trust
  - class
  - series
normalization:
  uppercase: true
  strip_punctuation: true
