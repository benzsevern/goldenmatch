name: Publish to npm

on:
  push:
    tags:
      - "goldenmatch-js-v*"
  workflow_dispatch:
    inputs:
      dry-run:
        description: "Pack and validate without publishing"
        required: false
        default: "false"

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/goldenmatch-js
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build

      - name: Verify version matches tag
        if: startsWith(github.ref, 'refs/tags/goldenmatch-js-v')
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/goldenmatch-js-v}"
          PKG_VERSION=$(jq -r .version package.json)
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "Tag version ($TAG_VERSION) does not match package.json ($PKG_VERSION)"
            exit 1
          fi
          echo "Version OK: $PKG_VERSION"

      - name: Pack (dry-run)
        if: github.event.inputs.dry-run == 'true'
        run: npm pack --dry-run

      - name: Publish to npm
        if: github.event.inputs.dry-run != 'true'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public --provenance
