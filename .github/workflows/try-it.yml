name: "Try GoldenMatch"

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "What to run"
        type: choice
        options:
          - "Basic Dedupe (sample data)"
          - "Custom CSV"
          - "DQBench Benchmark"
        default: "Basic Dedupe (sample data)"
      csv_url:
        description: "URL to a CSV file (only used in 'Custom CSV' mode)"
        required: false
        type: string
      config:
        description: "Match config for Custom CSV (simple|fuzzy|exact) or raw YAML"
        required: false
        default: "simple"
        type: string
      name_columns:
        description: "Comma-separated name columns (Custom CSV only, e.g. first_name,last_name)"
        required: false
        type: string
      email_column:
        description: "Email column name (Custom CSV only)"
        required: false
        type: string

permissions:
  contents: read

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      INPUT_CSV_URL: ${{ github.event.inputs.csv_url }}
      INPUT_CONFIG: ${{ github.event.inputs.config }}
      INPUT_NAME_COLUMNS: ${{ github.event.inputs.name_columns }}
      INPUT_EMAIL_COLUMN: ${{ github.event.inputs.email_column }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install GoldenMatch
        run: pip install goldenmatch

      # ── Mode 1: Basic Dedupe ──────────────────────────────────────
      - name: Basic Dedupe (sample data)
        if: inputs.mode == 'Basic Dedupe (sample data)'
        run: python examples/basic_dedupe.py

      # ── Mode 2: Custom CSV ────────────────────────────────────────
      - name: Download CSV
        if: inputs.mode == 'Custom CSV'
        run: |
          curl -fsSL "$INPUT_CSV_URL" -o input.csv
          echo "=== First 5 rows ==="
          head -6 input.csv

      - name: Generate config
        if: inputs.mode == 'Custom CSV'
        run: |
          python -c "
          import os, sys, yaml

          preset = os.environ.get('INPUT_CONFIG', 'simple').strip()
          name_cols = os.environ.get('INPUT_NAME_COLUMNS', '').strip()
          email_col = os.environ.get('INPUT_EMAIL_COLUMN', '').strip()

          if preset in ('simple', 'exact', 'fuzzy'):
              matchkeys = []
              if email_col:
                  matchkeys.append({
                      'name': 'exact_email',
                      'type': 'exact',
                      'fields': [{'field': email_col, 'transforms': ['lowercase', 'strip']}],
                  })
              if name_cols:
                  fields = []
                  for col in name_cols.split(','):
                      col = col.strip()
                      fields.append({
                          'field': col,
                          'transforms': ['lowercase', 'strip'],
                          'scorer': 'jaro_winkler',
                          'weight': 1.0,
                      })
                  matchkeys.append({
                      'name': 'fuzzy_name',
                      'type': 'weighted',
                      'threshold': 0.85,
                      'fields': fields,
                  })
              if not matchkeys:
                  import polars as pl
                  df = pl.read_csv('input.csv', n_rows=5)
                  str_cols = [c for c in df.columns if df[c].dtype == pl.Utf8][:3]
                  for col in str_cols:
                      matchkeys.append({
                          'name': f'exact_{col}',
                          'type': 'exact',
                          'fields': [{'field': col, 'transforms': ['lowercase', 'strip']}],
                      })
              config = {'matchkeys': matchkeys}
          else:
              config = yaml.safe_load(preset)

          with open('config.yaml', 'w') as f:
              yaml.dump(config, f, default_flow_style=False)
          print('Generated config:')
          print(yaml.dump(config, default_flow_style=False))
          "

      - name: Run GoldenMatch (Custom CSV)
        if: inputs.mode == 'Custom CSV'
        run: goldenmatch dedupe input.csv --config config.yaml --output results.csv

      - name: Show results summary
        if: inputs.mode == 'Custom CSV'
        run: |
          python -c "
          import polars as pl
          df = pl.read_csv('results.csv')
          total = df.height
          dupes = df.filter(pl.col('__classification__') == 'dupe').height if '__classification__' in df.columns else 0
          clusters = df['__cluster_id__'].n_unique() if '__cluster_id__' in df.columns else 0
          print(f'Total records: {total}')
          print(f'Clusters found: {clusters}')
          print(f'Duplicate records: {dupes}')
          print(f'Match rate: {dupes/total:.1%}' if total else 'N/A')
          print()
          print('First 20 rows:')
          print(df.head(20))
          "

      - name: Upload results
        if: inputs.mode == 'Custom CSV'
        uses: actions/upload-artifact@v4
        with:
          name: goldenmatch-results
          path: results.csv
          retention-days: 30

      # ── Mode 3: DQBench Benchmark ─────────────────────────────────
      - name: Install DQBench
        if: inputs.mode == 'DQBench Benchmark'
        run: pip install dqbench

      - name: DQBench Benchmark
        if: inputs.mode == 'DQBench Benchmark'
        run: python examples/benchmark.py
